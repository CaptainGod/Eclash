name: Build macOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Download mihomo macos binary
        run: bash scripts/download_mihomo.sh macos

      - name: Build macOS
        run: flutter build macos --release

      - name: Package DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Eclash" \
            --window-size 600 400 \
            --app-drop-link 450 200 \
            Eclash.dmg \
            "build/macos/Build/Products/Release/eclash.app"

      - uses: actions/upload-artifact@v4
        with:
          name: eclash-macos
          path: Eclash.dmg
