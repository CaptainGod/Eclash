name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      - name: Download mihomo for Android
        run: bash scripts/download_mihomo.sh android
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: eclash-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      - name: Download mihomo for Windows
        shell: bash
        run: bash scripts/download_mihomo.sh windows
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package ZIP
        shell: powershell
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath eclash-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: eclash-windows
          path: eclash-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      - name: Download mihomo for macOS
        run: bash scripts/download_mihomo.sh macos
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Eclash" \
            --window-size 600 400 \
            --app-drop-link 450 200 \
            Eclash.dmg \
            "build/macos/Build/Products/Release/eclash.app"
      - uses: actions/upload-artifact@v4
        with:
          name: eclash-macos
          path: Eclash.dmg

  release:
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/eclash-android/app-release.apk
            artifacts/eclash-windows/eclash-windows.zip
            artifacts/eclash-macos/Eclash.dmg
          generate_release_notes: true
          draft: false
