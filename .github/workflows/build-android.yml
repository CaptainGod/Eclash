name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Download mihomo for Android
        run: bash scripts/download_mihomo.sh android

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
            echo "$KEY_PROPERTIES" > android/key.properties
            echo "Signing config applied."
          else
            echo "No signing secrets found, using debug signing."
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eclash-android-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
