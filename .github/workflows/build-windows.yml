name: Build Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Download mihomo windows binary
        shell: bash
        run: bash scripts/download_mihomo.sh windows

      - name: Build Windows
        run: flutter build windows --release

      - name: Package ZIP
        shell: powershell
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath eclash-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: eclash-windows
          path: eclash-windows.zip
